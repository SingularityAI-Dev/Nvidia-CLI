<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <style>
      .t { fill: #e6edf3; font-size: 13px; }
      .d { fill: #8b949e; font-size: 13px; }
      .g { fill: #3fb950; font-size: 13px; }
      .o { fill: #f0883e; font-size: 13px; }
      .b { fill: #58a6ff; font-size: 13px; }
      .p { fill: #bc8cff; font-size: 13px; }
    </style>
  </defs>

  <rect width="860" height="340" fill="#0d1117" rx="10"/>
  <!-- toolbar -->
  <rect width="860" height="36" fill="#161b22" rx="10"/>
  <rect width="860" height="18" y="18" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="430" y="23" text-anchor="middle" fill="#8b949e" font-size="12" font-family="'SF Mono','Fira Code',monospace">nvidia-cli — nv agent</text>

  <!-- Line 1: prompt -->
  <text x="20" y="68" class="d" opacity="0">$ nv agent list
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- Line 2: blank -->
  <!-- Line 3: header -->
  <text x="20" y="96" class="d" opacity="0">  NAME          MODEL                    STATUS
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.01s" fill="freeze"/>
  </text>
  <!-- divider -->
  <line x1="20" y1="104" x2="680" y2="104" stroke="#30363d" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.01s" fill="freeze"/>
  </line>

  <!-- agent rows -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.01s" fill="freeze"/>
    <text x="20" y="122" class="t">  default</text>
    <text x="160" y="122" class="t">nvidia/llama-3.1-70b</text>
    <circle cx="452" cy="118" r="5" fill="#3fb950"/>
    <text x="462" y="122" class="g">active</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.01s" fill="freeze"/>
    <text x="20" y="144" class="t">  codebot</text>
    <text x="160" y="144" class="t">nvidia/mistral-nemo</text>
    <circle cx="452" cy="140" r="5" fill="#3fb950"/>
    <text x="462" y="144" class="g">active</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.01s" fill="freeze"/>
    <text x="20" y="166" class="t">  researcher</text>
    <text x="160" y="166" class="t">nvidia/llama-3.3-70b</text>
    <circle cx="452" cy="162" r="5" fill="#8b949e"/>
    <text x="462" y="166" class="d">idle</text>
  </g>

  <!-- Line: nv agent create -->
  <text x="20" y="196" class="t" opacity="0">$ nv agent create devops-bot
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.01s" fill="freeze"/>
  </text>

  <text x="20" y="218" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.01s" fill="freeze"/>
    <tspan class="b">  → </tspan><tspan class="t">Initialising agent </tspan><tspan class="o">devops-bot</tspan><tspan class="t">...</tspan>
  </text>
  <text x="20" y="240" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.01s" fill="freeze"/>
    <tspan class="b">  → </tspan><tspan class="t">Loading soul files from </tspan><tspan class="o">.nv/souls/devops-bot/</tspan>
  </text>
  <text x="20" y="262" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.01s" fill="freeze"/>
    <tspan class="b">  → </tspan><tspan class="t">Spawning 2 subagents for parallel execution</tspan>
  </text>
  <text x="20" y="284" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.01s" fill="freeze"/>
    <tspan class="g">  ✓ </tspan><tspan class="t">Agent </tspan><tspan class="o">devops-bot</tspan><tspan class="t"> ready</tspan>
  </text>

  <!-- cursor blink -->
  <text x="20" y="314" class="d" opacity="0">$
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.01s" fill="freeze"/>
  </text>
  <rect x="32" y="300" width="9" height="16" fill="#e6edf3" rx="1">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;1;1;0;1;1;0;1;1;0" begin="4.0s" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
