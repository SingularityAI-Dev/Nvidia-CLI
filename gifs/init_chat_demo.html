
<style>
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  .cursor { animation: blink 1s step-end infinite; }
  .line { animation: fadeIn 0.2s ease forwards; opacity: 0; }
  .spinner { display:inline-block; animation: spin .7s linear infinite; }
  * { box-sizing:border-box; margin:0; padding:0; }
</style>
<div style="background:#0d1117;border-radius:10px;overflow:hidden;font-family:var(--font-mono);font-size:13px;line-height:1.6;padding:0 0 4px;">
  <div style="background:#161b22;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #30363d">
    <span style="width:12px;height:12px;border-radius:50%;background:#ff5f56;display:inline-block"></span>
    <span style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;display:inline-block"></span>
    <span style="width:12px;height:12px;border-radius:50%;background:#27c93f;display:inline-block"></span>
    <span style="margin-left:8px;color:#8b949e;font-size:12px">nvidia-cli — nv chat / /init</span>
  </div>
  <div id="term-init" style="padding:16px 20px;min-height:280px;"></div>
</div>
<script>
const lines = [
  { text: '$ nv chat', color: '#e6edf3', delay: 400 },
  { text: '  <span style="color:#3fb950">✓</span> Connected to <span style="color:#f0883e">nvidia/llama-3.1-70b-instruct</span>', delay: 280 },
  { text: '  Type <span style="color:#79c0ff">/help</span> for commands. <span style="color:#8b949e">Permission mode: ask</span>', delay: 150 },
  { text: '', delay: 100 },
  { text: '<span style="color:#8b949e">nv&gt;</span> /init', color: '#e6edf3', delay: 600 },
  { text: '', delay: 80 },
  { text: '  <span style="color:#79c0ff">→</span> Analysing codebase in <span style="color:#f0883e">~/projects/my-api</span>...', delay: 250 },
  { text: '  <span style="color:#8b949e">  <span class="spinner">◌</span></span> Scanning 142 files across 18 modules', delay: 300 },
  { text: '  <span style="color:#8b949e">  Detected:</span> Python 3.11 · FastAPI · PostgreSQL · Redis', delay: 300 },
  { text: '  <span style="color:#3fb950">✓</span> Context map saved to <span style="color:#f0883e">.nv/NVIDIA.md</span>', delay: 250 },
  { text: '', delay: 80 },
  { text: '<span style="color:#d2a8ff">Nova 🤖</span> <span style="color:#8b949e">&gt;</span> Got it! I\'ve mapped your FastAPI project.', delay: 400 },
  { text: '         Found 4 routers, 3 DB models, and a Redis cache layer.', color: '#c9d1d9', delay: 100 },
  { text: '         What would you like to work on?', color: '#c9d1d9', delay: 80 },
  { text: '', delay: 100 },
  { text: '<span style="color:#8b949e">nv&gt;</span> /add src/auth/router.py', color: '#e6edf3', delay: 700 },
  { text: '  <span style="color:#3fb950">✓</span> Loaded <span style="color:#f0883e">src/auth/router.py</span> into context (284 lines)', delay: 300 },
  { text: '', delay: 100 },
  { text: '<span style="color:#8b949e">nv&gt;</span> <span class="cursor" style="background:#e6edf3;color:#0d1117">_</span>', delay: 200 },
];
const el = document.getElementById('term-init');
let i = 0;
function next() {
  if (i >= lines.length) return;
  const l = lines[i++];
  const div = document.createElement('div');
  div.className = 'line';
  div.style.color = l.color || '#e6edf3';
  div.innerHTML = l.text;
  el.appendChild(div);
  setTimeout(next, l.delay + 220);
}
setTimeout(next, 400);
</script>
