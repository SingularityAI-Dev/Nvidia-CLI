
<style>
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
  .cursor { animation: blink 1s step-end infinite; }
  .line { animation: fadeIn 0.2s ease forwards; opacity: 0; }
  .heartfile { animation: pulse 2s ease-in-out infinite; }
  * { box-sizing:border-box; margin:0; padding:0; }
</style>
<div style="background:#0d1117;border-radius:10px;overflow:hidden;font-family:var(--font-mono);font-size:13px;line-height:1.6;padding:0 0 4px;">
  <div style="background:#161b22;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #30363d">
    <span style="width:12px;height:12px;border-radius:50%;background:#ff5f56;display:inline-block"></span>
    <span style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;display:inline-block"></span>
    <span style="width:12px;height:12px;border-radius:50%;background:#27c93f;display:inline-block"></span>
    <span style="margin-left:8px;color:#8b949e;font-size:12px">nvidia-cli — soul / identity</span>
  </div>
  <div id="term-soul" style="padding:16px 20px;min-height:240px;"></div>
</div>
<script>
const lines = [
  { text: '$ nv chat', color: '#e6edf3', delay: 400 },
  { text: '  <span style="color:#79c0ff">→</span> Loading soul middleware...', color: '#e6edf3', delay: 350 },
  { text: '', delay: 80 },
  { text: '  <span style="color:#f0883e">SOUL.md</span>       <span style="color:#3fb950">✓</span>  Principles &amp; values loaded', delay: 200 },
  { text: '  <span style="color:#f0883e">IDENTITY.md</span>   <span style="color:#3fb950">✓</span>  Agent: <span style="color:#d2a8ff">Nova 🤖</span>', delay: 180 },
  { text: '  <span style="color:#f0883e">USER.md</span>       <span style="color:#3fb950">✓</span>  Preferences injected', delay: 180 },
  { text: '  <span style="color:#f0883e">MEMORY.md</span>     <span style="color:#3fb950">✓</span>  12 long-term memories active', delay: 180 },
  { text: '  <span style="color:#f0883e" class="heartfile">HEARTBEAT.md</span>  <span style="color:#3fb950">✓</span>  3 scheduled tasks', delay: 180 },
  { text: '', delay: 100 },
  { text: '  <span style="color:#3fb950">✓</span> Identity middleware active — soul injected into context', delay: 200 },
  { text: '', delay: 150 },
  { text: '<span style="color:#d2a8ff">Nova 🤖</span><span style="color:#8b949e"> &gt;</span> Hello! I\'m Nova. How can I help you today?', delay: 500 },
  { text: '', delay: 100 },
  { text: '<span style="color:#8b949e">you &gt;</span> <span class="cursor" style="background:#e6edf3;color:#0d1117">_</span>', delay: 200 },
];
const el = document.getElementById('term-soul');
let i = 0;
function next() {
  if (i >= lines.length) return;
  const l = lines[i++];
  const div = document.createElement('div');
  div.className = 'line';
  div.style.color = l.color || '#e6edf3';
  div.innerHTML = l.text;
  el.appendChild(div);
  setTimeout(next, l.delay + 220);
}
setTimeout(next, 400);
</script>
