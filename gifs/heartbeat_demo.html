
<style>
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  @keyframes hb { 0%,100%{transform:scale(1);opacity:.7} 10%{transform:scale(1.35);opacity:1} 20%{transform:scale(1);opacity:.7} 30%{transform:scale(1.2);opacity:1} 40%{transform:scale(1);opacity:.7} }
  .cursor { animation: blink 1s step-end infinite; }
  .line { animation: fadeIn 0.2s ease forwards; opacity: 0; }
  .hb-icon { display:inline-block; animation: hb 1.8s ease-in-out infinite; }
  * { box-sizing:border-box; margin:0; padding:0; }
</style>
<div style="background:#0d1117;border-radius:10px;overflow:hidden;font-family:var(--font-mono);font-size:13px;line-height:1.6;padding:0 0 4px;">
  <div style="background:#161b22;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #30363d">
    <span style="width:12px;height:12px;border-radius:50%;background:#ff5f56;display:inline-block"></span>
    <span style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;display:inline-block"></span>
    <span style="width:12px;height:12px;border-radius:50%;background:#27c93f;display:inline-block"></span>
    <span style="margin-left:8px;color:#8b949e;font-size:12px">nvidia-cli — heartbeat system</span>
  </div>
  <div id="term-hb" style="padding:16px 20px;min-height:240px;"></div>
</div>
<script>
const lines = [
  { text: '$ nv heartbeat status', color: '#e6edf3', delay: 400 },
  { text: '', delay: 80 },
  { text: '  <span class="hb-icon" style="color:#f85149">♥</span>  Heartbeat <span style="color:#3fb950">running</span> — 3 tasks registered', delay: 250 },
  { text: '', delay: 80 },
  { text: '  TASK                   INTERVAL    LAST RUN     STATUS', color: '#8b949e', delay: 200 },
  { text: '  ────────────────────────────────────────────────────', color: '#30363d', delay: 50 },
  { text: '  sync-project-context   15 min      2 min ago    <span style="color:#3fb950">✓ ok</span>', delay: 150 },
  { text: '  check-git-status       30 min      17 min ago   <span style="color:#3fb950">✓ ok</span>', delay: 130 },
  { text: '  summarise-logs         60 min      42 min ago   <span style="color:#3fb950">✓ ok</span>', delay: 130 },
  { text: '', delay: 100 },
  { text: '  Quiet hours: <span style="color:#f0883e">22:00 – 07:00</span>  (currently active: <span style="color:#3fb950">yes</span>)', delay: 200 },
  { text: '', delay: 200 },
  { text: '  <span style="color:#79c0ff">[batch]</span> Running grouped checks...', delay: 600 },
  { text: '  <span style="color:#79c0ff">→</span> sync-project-context  <span style="color:#3fb950">✓</span> context refreshed', delay: 300 },
  { text: '  <span style="color:#79c0ff">→</span> check-git-status      <span style="color:#3fb950">✓</span> 2 uncommitted files', delay: 250 },
  { text: '  <span style="color:#79c0ff">→</span> summarise-logs        <span style="color:#3fb950">✓</span> 0 errors in last hour', delay: 250 },
  { text: '', delay: 100 },
  { text: '$ <span class="cursor" style="background:#e6edf3;color:#0d1117">_</span>', delay: 200 },
];
const el = document.getElementById('term-hb');
let i = 0;
function next() {
  if (i >= lines.length) return;
  const l = lines[i++];
  const div = document.createElement('div');
  div.className = 'line';
  div.style.color = l.color || '#e6edf3';
  div.innerHTML = l.text;
  el.appendChild(div);
  setTimeout(next, l.delay + 220);
}
setTimeout(next, 400);
</script>
