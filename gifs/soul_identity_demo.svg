<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <rect width="860" height="320" fill="#0d1117" rx="10"/>
  <rect width="860" height="36" fill="#161b22" rx="10"/>
  <rect width="860" height="18" y="18" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>
  <text x="430" y="23" text-anchor="middle" fill="#8b949e" font-size="12" font-family="'SF Mono','Fira Code',monospace">nvidia-cli — soul / identity</text>

  <text x="20" y="68" fill="#e6edf3" font-size="13" opacity="0">$ nv chat
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.01s" fill="freeze"/>
  </text>
  <text x="20" y="90" fill="#58a6ff" font-size="13" opacity="0">  → Loading soul middleware...
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.01s" fill="freeze"/>
  </text>

  <!-- file rows -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.01s" fill="freeze"/>
    <text x="20" y="114" fill="#f0883e" font-size="13">  SOUL.md      </text>
    <text x="172" y="114" fill="#3fb950" font-size="13">✓  </text>
    <text x="196" y="114" fill="#e6edf3" font-size="13">Principles &amp; values loaded</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.01s" fill="freeze"/>
    <text x="20" y="136" fill="#f0883e" font-size="13">  IDENTITY.md  </text>
    <text x="172" y="136" fill="#3fb950" font-size="13">✓  </text>
    <text x="196" y="136" fill="#e6edf3" font-size="13">Agent: </text>
    <text x="244" y="136" fill="#bc8cff" font-size="13">Nova 🤖</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.01s" fill="freeze"/>
    <text x="20" y="158" fill="#f0883e" font-size="13">  USER.md      </text>
    <text x="172" y="158" fill="#3fb950" font-size="13">✓  </text>
    <text x="196" y="158" fill="#e6edf3" font-size="13">Preferences injected</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.01s" fill="freeze"/>
    <text x="20" y="180" fill="#f0883e" font-size="13">  MEMORY.md    </text>
    <text x="172" y="180" fill="#3fb950" font-size="13">✓  </text>
    <text x="196" y="180" fill="#e6edf3" font-size="13">12 long-term memories active</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.01s" fill="freeze"/>
    <text x="20" y="202" fill="#f0883e" font-size="13">  HEARTBEAT.md </text>
    <text x="172" y="202" fill="#3fb950" font-size="13">✓  </text>
    <text x="196" y="202" fill="#e6edf3" font-size="13">3 scheduled tasks</text>
  </g>

  <text x="20" y="228" fill="#3fb950" font-size="13" opacity="0">  ✓ Identity middleware active — soul injected into context
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.01s" fill="freeze"/>
  </text>

  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.01s" fill="freeze"/>
    <text x="20" y="256" fill="#bc8cff" font-size="13">Nova 🤖</text>
    <text x="84" y="256" fill="#8b949e" font-size="13"> &gt; Hello! I'm Nova. How can I help you today?</text>
  </g>
  <text x="20" y="284" fill="#8b949e" font-size="13" opacity="0">you &gt;
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.01s" fill="freeze"/>
  </text>
  <rect x="68" y="270" width="9" height="16" fill="#e6edf3" rx="1">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;1;1;0;1;1;0" begin="3.8s" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
