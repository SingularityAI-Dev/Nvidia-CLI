<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .title { fill: #e6edf3; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
      .subtitle { fill: #7d8590; font-size: 11px; letter-spacing: 3px; }
      .label { fill: #7d8590; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; }
      .name { fill: #e6edf3; font-size: 15px; font-weight: 700; }
      .name-lg { fill: #e6edf3; font-size: 22px; font-weight: 700; }
      .meta { fill: #6e7681; font-size: 10px; }
      .pill { fill: #161b22; stroke-width: 1.5; }
      .chip { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
      .chip-text { fill: #c9d1d9; font-size: 11px; }
      .nvgreen { fill: #76b900; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
      .model-id { fill: #6e7681; font-size: 10px; font-family: 'SF Mono', Menlo, monospace; }
      .badge { fill: #76b900; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
      .tag-blue { fill: #3b82f6; font-size: 9px; font-weight: 600; letter-spacing: 1px; }
      .sect-orange { fill: #f97316; font-size: 11px; font-weight: 600; letter-spacing: 2px; }
      .sect-green { fill: #22c55e; font-size: 11px; font-weight: 600; letter-spacing: 2px; }
      .sect-blue { fill: #3b82f6; font-size: 11px; font-weight: 600; letter-spacing: 2px; }
      .sect-purple { fill: #a855f7; font-size: 11px; font-weight: 600; letter-spacing: 2px; }
    </style>
    <marker id="ar-o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f97316"/></marker>
    <marker id="ar-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/></marker>
    <marker id="ar-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/></marker>
    <marker id="ar-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#a855f7"/></marker>
    <marker id="ar-nv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#76b900"/></marker>
  </defs>

  <rect class="bg" width="1420" height="880"/>

  <text x="710" y="42" text-anchor="middle" class="title">NVIDIA CLI v7.0</text>
  <text x="710" y="62" text-anchor="middle" class="subtitle">AGENTIC FRAMEWORK ARCHITECTURE</text>

  <!-- USER ENTRY -->
  <text x="60" y="100" class="sect-orange">USER ENTRY</text>
  <g>
    <rect x="60" y="115" width="160" height="70" rx="8" class="pill" stroke="#f97316"/>
    <text x="140" y="142" text-anchor="middle" class="label" fill="#f97316">INTERACTIVE</text>
    <text x="140" y="165" text-anchor="middle" class="name">nv chat</text>
  </g>
  <g>
    <rect x="235" y="115" width="160" height="70" rx="8" class="pill" stroke="#f97316"/>
    <text x="315" y="142" text-anchor="middle" class="label" fill="#f97316">MULTI-AGENT</text>
    <text x="315" y="165" text-anchor="middle" class="name">nv agent</text>
  </g>
  <g>
    <rect x="410" y="115" width="160" height="70" rx="8" class="pill" stroke="#f97316"/>
    <text x="490" y="142" text-anchor="middle" class="label" fill="#f97316">SKILLS</text>
    <text x="490" y="165" text-anchor="middle" class="name">nv skill</text>
  </g>
  <g>
    <rect x="585" y="115" width="160" height="70" rx="8" class="pill" stroke="#f97316"/>
    <text x="665" y="142" text-anchor="middle" class="label" fill="#f97316">MEMORY</text>
    <text x="665" y="165" text-anchor="middle" class="name">nv memory</text>
  </g>

  <g fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#ar-o)" stroke-dasharray="6 6">
    <line x1="140" y1="185" x2="320" y2="270"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="315" y1="185" x2="370" y2="270"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="490" y1="185" x2="430" y2="270"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="665" y1="185" x2="490" y2="270"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/></line>
  </g>

  <!-- AGENT CORE -->
  <text x="60" y="225" class="sect-blue">AGENT CORE</text>
  <g>
    <rect x="60" y="240" width="540" height="120" rx="10" fill="#0d1f33" stroke="#3b82f6" stroke-width="2"/>
    <text x="330" y="270" text-anchor="middle" class="label" fill="#3b82f6">REACT LOOP</text>
    <text x="330" y="305" text-anchor="middle" class="name-lg">ReActAgent</text>
    <text x="330" y="335" text-anchor="middle" class="meta">Reason · Act · Observe · Iterate</text>
  </g>

  <g>
    <rect x="620" y="240" width="320" height="120" rx="10" fill="#1a0d33" stroke="#a855f7" stroke-width="2"/>
    <text x="780" y="270" text-anchor="middle" class="label" fill="#a855f7">SOUL MIDDLEWARE</text>
    <text x="780" y="300" text-anchor="middle" class="name-lg">SOUL.md</text>
    <text x="780" y="325" text-anchor="middle" class="meta">IDENTITY · USER MEMORY</text>
    <text x="780" y="342" text-anchor="middle" class="meta">HEARTBEAT</text>
  </g>

  <g>
    <line x1="600" y1="288" x2="620" y2="288" stroke="#a855f7" stroke-width="2" marker-end="url(#ar-p)" stroke-dasharray="5 4"><animate attributeName="stroke-dashoffset" from="18" to="0" dur="0.9s" repeatCount="indefinite"/></line>
    <text x="610" y="280" text-anchor="middle" fill="#a855f7" font-size="8">API call</text>
    <line x1="620" y1="318" x2="600" y2="318" stroke="#22c55e" stroke-width="2" marker-end="url(#ar-g)" stroke-dasharray="5 4"><animate attributeName="stroke-dashoffset" from="-18" to="0" dur="0.9s" repeatCount="indefinite"/></line>
    <text x="610" y="335" text-anchor="middle" fill="#22c55e" font-size="8">response stream</text>
  </g>

  <!-- TOOLS & MEMORY -->
  <text x="60" y="400" class="sect-green">TOOLS &amp; MEMORY</text>

  <g>
    <rect x="60" y="415" width="280" height="170" rx="10" fill="#0d2818" stroke="#22c55e" stroke-width="2"/>
    <text x="200" y="442" text-anchor="middle" class="label" fill="#22c55e">BUILT-IN TOOLS</text>
    <rect x="80" y="455" width="115" height="32" rx="6" class="chip"/><text x="137" y="476" text-anchor="middle" class="chip-text">file_read</text>
    <rect x="205" y="455" width="115" height="32" rx="6" class="chip"/><text x="262" y="476" text-anchor="middle" class="chip-text">file_write</text>
    <rect x="80" y="497" width="115" height="32" rx="6" class="chip"/><text x="137" y="518" text-anchor="middle" class="chip-text">bash_exec</text>
    <rect x="205" y="497" width="115" height="32" rx="6" class="chip"/><text x="262" y="518" text-anchor="middle" class="chip-text">web_search</text>
    <rect x="80" y="539" width="115" height="32" rx="6" class="chip"/><text x="137" y="560" text-anchor="middle" class="chip-text">git_ops</text>
    <rect x="205" y="539" width="115" height="32" rx="6" class="chip"/><text x="262" y="560" text-anchor="middle" class="chip-text">subagent</text>
    <text x="200" y="582" text-anchor="middle" class="meta">+ installed skills</text>
  </g>

  <g>
    <rect x="360" y="415" width="280" height="170" rx="10" fill="#0d1f33" stroke="#3b82f6" stroke-width="2"/>
    <text x="500" y="442" text-anchor="middle" class="label" fill="#3b82f6">HYBRID MEMORY</text>
    <rect x="380" y="455" width="240" height="34" rx="6" class="chip" stroke="#3b82f6"/><text x="500" y="477" text-anchor="middle" class="chip-text">Vector Search</text>
    <rect x="380" y="497" width="240" height="34" rx="6" class="chip" stroke="#3b82f6"/><text x="500" y="519" text-anchor="middle" class="chip-text">BM25 Keyword</text>
    <rect x="380" y="539" width="240" height="34" rx="6" class="chip"/><text x="500" y="561" text-anchor="middle" class="chip-text">SQLite persistent store</text>
  </g>

  <g fill="none" stroke-width="2" stroke-dasharray="6 6">
    <line x1="200" y1="360" x2="200" y2="415" stroke="#22c55e" marker-end="url(#ar-g)"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite"/></line>
    <line x1="500" y1="360" x2="500" y2="415" stroke="#3b82f6" marker-end="url(#ar-b)"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite"/></line>
  </g>

  <!-- SKILLS & CONFIG -->
  <text x="60" y="625" class="sect-green">SKILLS &amp; CONFIG</text>
  <g>
    <rect x="60" y="640" width="180" height="105" rx="10" fill="#0d2818" stroke="#22c55e" stroke-width="2"/>
    <text x="150" y="667" text-anchor="middle" class="label" fill="#22c55e">SECURITY SCANNER</text>
    <text x="150" y="697" text-anchor="middle" class="name">Skills</text>
    <text x="150" y="725" text-anchor="middle" class="meta">pip · npm · brew · git</text>
  </g>
  <g>
    <rect x="260" y="640" width="180" height="105" rx="10" fill="#0d1f33" stroke="#3b82f6" stroke-width="2"/>
    <text x="350" y="667" text-anchor="middle" class="label" fill="#3b82f6">VALIDATION</text>
    <text x="350" y="697" text-anchor="middle" class="name">Config</text>
    <text x="350" y="725" text-anchor="middle" class="meta">models · permissions · keys</text>
  </g>
  <g>
    <rect x="460" y="640" width="180" height="105" rx="10" fill="#1a0d33" stroke="#a855f7" stroke-width="2"/>
    <text x="550" y="667" text-anchor="middle" class="label" fill="#a855f7">SCHEDULER</text>
    <text x="550" y="697" text-anchor="middle" class="name">Heartbeat</text>
    <text x="550" y="725" text-anchor="middle" class="meta">cron · quiet hours · batch</text>
  </g>

  <!-- NVIDIA NIM -->
  <text x="970" y="100" class="sect-green">NVIDIA AI ENDPOINTS</text>
  <g>
    <rect x="970" y="115" width="400" height="660" rx="12" fill="#0d1a0d" stroke="#76b900" stroke-width="2"/>
    <text x="1170" y="155" text-anchor="middle" class="nvgreen">NVIDIA</text>
    <text x="1170" y="175" text-anchor="middle" class="meta">NIM API · build.nvidia.com</text>

    <rect x="990" y="195" width="360" height="56" rx="8" class="chip"/>
    <text x="1010" y="220" class="name">Llama 3.1 70B Instruct</text>
    <text x="1010" y="240" class="model-id">meta/llama-3.1-70b-instruct</text>
    <rect x="1280" y="207" width="58" height="20" rx="4" fill="#1a2e0a" stroke="#76b900"/>
    <text x="1309" y="221" text-anchor="middle" class="badge">DEFAULT</text>

    <rect x="990" y="262" width="360" height="56" rx="8" class="chip"/>
    <text x="1010" y="287" class="name">Llama 3.3 70B Instruct</text>
    <text x="1010" y="307" class="model-id">meta/llama-3.3-70b-instruct</text>

    <rect x="990" y="329" width="360" height="56" rx="8" class="chip"/>
    <text x="1010" y="354" class="name">Mistral Nemo Instruct</text>
    <text x="1010" y="374" class="model-id">nvidia/mistral-nemo-12b-instruct</text>

    <rect x="990" y="396" width="360" height="56" rx="8" class="chip"/>
    <text x="1010" y="421" class="name">DeepSeek R1 Distill</text>
    <text x="1010" y="441" class="model-id">deepseek/deepseek-r1-distill-llama-70b</text>

    <rect x="990" y="463" width="360" height="56" rx="8" class="chip"/>
    <text x="1010" y="488" class="name">Qwen 2.5 Coder 32B</text>
    <text x="1010" y="508" class="model-id">qwen/qwen2.5-coder-32b-instruct</text>

    <rect x="990" y="530" width="360" height="56" rx="8" class="chip" stroke="#3b82f6"/>
    <text x="1010" y="553" class="name">NV-EmbedQA-E5-v5</text>
    <text x="1010" y="572" class="tag-blue">EMBEDDINGS</text>
    <text x="1090" y="572" class="meta">· vector memory</text>

    <rect x="990" y="597" width="360" height="56" rx="8" class="chip" stroke="#3b82f6"/>
    <text x="1010" y="620" class="name">NV-RerankQA-Mistral</text>
    <text x="1010" y="639" class="tag-blue">RERANKER</text>
    <text x="1075" y="639" class="meta">· hybrid memory</text>

    <text x="1170" y="675" text-anchor="middle" class="meta">switch at runtime with /model &lt;name&gt;</text>
    <text x="1170" y="697" text-anchor="middle" class="label">PERMISSION MODES</text>

    <rect x="1010" y="708" width="70" height="22" rx="11" fill="#2d0a0a" stroke="#ef4444"/>
    <text x="1045" y="723" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">ask</text>
    <rect x="1090" y="708" width="90" height="22" rx="11" fill="#2d1a0a" stroke="#f97316"/>
    <text x="1135" y="723" text-anchor="middle" font-size="10" font-weight="600" fill="#f97316">accept_edits</text>
    <rect x="1190" y="708" width="70" height="22" rx="11" fill="#0a2d1a" stroke="#22c55e"/>
    <text x="1225" y="723" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e">auto</text>
    <rect x="1270" y="708" width="70" height="22" rx="11" fill="#1a1a1a" stroke="#7d8590"/>
    <text x="1305" y="723" text-anchor="middle" font-size="10" font-weight="600" fill="#7d8590">never</text>

    <text x="1170" y="755" text-anchor="middle" class="meta">/init → .nv/NVIDIA.md context map</text>
  </g>

  <!-- Animated cross-column connectors -->
  <path d="M 640 500 C 800 500, 850 555, 990 558" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#ar-b)">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M 600 290 C 780 200, 880 180, 990 220" fill="none" stroke="#76b900" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#ar-nv)">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M 940 300 C 960 295, 975 290, 990 285" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#ar-p)">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.9s" repeatCount="indefinite"/>
  </path>
</svg>
